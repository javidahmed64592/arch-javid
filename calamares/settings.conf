---
# Calamares main configuration for arch-javid installer
modules-search: [ local, /usr/lib/calamares/modules ]

# Installation sequence:
#   show:  pages the user steps through
#   exec:  modules that run the actual install
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - luksbootkeyfile
      - users
      - networkcfg
      - hwclock
      - services-systemd
      - packages
      - shellprocess@mkinitcpio
      - shellprocess@bootloader
      - umount
  - show:
      - finished

branding: arch-javid

# Ask the user to confirm before starting the install
prompt-install: true

dont-chroot: false
oem-setup: false

# Allow the user to cancel before install begins, but not during
disable-cancel: false
disable-cancel-during-exec: true
