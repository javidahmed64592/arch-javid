---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id: multilib-live
    module: shellprocess
    config: shellprocess-multilib-live.conf
  - id: pacstrap
    module: shellprocess
    config: shellprocess-pacstrap.conf
  - id: multilib-installed
    module: shellprocess
    config: shellprocess-multilib-installed.conf
  - id: nvidia
    module: shellprocess
    config: shellprocess-nvidia.conf
  - id: initramfs
    module: shellprocess
    config: shellprocess-initramfs.conf

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - shellprocess@multilib-live
    - shellprocess@pacstrap
    - shellprocess@multilib-installed
    - machineid
    - fstab
    - localecfg
    - keyboard
    - timezone
    - networkcfg
    - hwclock
    - users
    - services-systemd
    - shellprocess@nvidia
    - shellprocess@initramfs
    - bootloader
    - umount
  - show:
    - finished

branding: default
prompt-install: true
dont-chroot: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
