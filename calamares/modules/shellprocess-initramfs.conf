---
# Rebuilds the initramfs in the installed system chroot.
# MUST run after shellprocess@nvidia (MODULES in mkinitcpio.conf must be set first).
# MUST run before bootloader (initramfs files must exist before the boot entry references them).
dontChroot: true
timeout: 600
script:
  - "/etc/calamares/scripts/initramfs.sh @@ROOT@@"
