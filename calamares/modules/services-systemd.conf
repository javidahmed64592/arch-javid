---
# systemd services to enable/disable in the installed system

units:
    - name: "NetworkManager"
      action: "enable"

    - name: "systemd-timesyncd"
      action: "enable"

    # firewalld is the firewall — ufw is not listed here because both tools
    # control nftables and enabling both would cause conflicts.
    - name: "firewalld"
      action: "enable"

    - name: "sddm"
      action: "enable"

    - name: "fstrim.timer"
      action: "enable"

    - name: "bluetooth"
      action: "enable"

    # arch-update user units — require arch-update to be installed (AUR).
    - name: "arch-update.timer"
      action: "enable"
      user: true

    - name: "arch-update-tray.service"
      action: "enable"
      user: true
