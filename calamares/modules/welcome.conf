---
# Whether to show the "what's new" / support / issues URLs on the welcome page
showSupportUrl:      false
showKnownIssuesUrl:  false
showReleaseNotesUrl: false
showDonateUrl:       false

requirements:
    # Checks that MUST pass for the install button to be enabled
    must:
        - storage
        - ram

    # Checks that are RECOMMENDED (shown as warnings if they fail, but don't block)
    recommended:
        - power
        - internet

    # Minimum free storage required on target (GiB)
    requiredStorage: 10

    # Minimum RAM required (GiB)
    requiredRam: 2.0

    # Check internet connectivity
    checkHasInternet: true
    internetCheckUrl: http://example.com

    # Check if the machine is plugged in
    checkIsPluggedIn: true
