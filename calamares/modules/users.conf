---
# Users module — creates the main user account

# The user-facing name for the login field
userShell: /bin/bash

# Groups automatically added to the new user
defaultGroups:
    - wheel
    - video
    - audio
    - network
    - storage
    - optical
    - power
    - lp
    - scanner

# Whether to allow an empty password (not recommended)
allowWeakPasswords: false
allowWeakPasswordsDefault: false

# Whether the password fields require confirmation
doAutoLogin: false

# Whether root account is enabled with same password
setRootPassword: true
doReusePassword: false

# sudoers rule written for the new user's group
sudoersGroup: wheel
