---
# Runs scripts/chroot/nvidia.sh inside the installed system chroot.
# Configures NVIDIA modprobe options and adds NVIDIA modules to mkinitcpio.conf.
# MUST run before shellprocess@initramfs (mkinitcpio reads mkinitcpio.conf).
dontChroot: true
timeout: 60
script:
  - "/etc/calamares/scripts/nvidia.sh"
