---
efiBootLoader: "systemd-boot"

# Kernel image and initramfs paths (relative to EFI partition mount point /boot)
kernel:   "/vmlinuz-linux"
img:      "/initramfs-linux.img"
fallback: "/initramfs-linux-fallback.img"

# Calamares prepends "root=UUID=<uuid> rw" automatically.
# Calamares also auto-detects /boot/intel-ucode.img and adds "initrd /intel-ucode.img"
# before the main initrd line.
kernelLine: "quiet nvidia-drm.modeset=1 nvidia_drm.fbdev=1"

timeout: "3"

efi:
  installPath: "/boot"
  id:          "arch"
  label:       "Arch Javid"
