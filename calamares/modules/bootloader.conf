---
# Install and configure systemd-boot inside the installed system chroot.
# Calamares mounts the ESP at /boot inside the chroot before this runs.
dontChroot: false
timeout: 60

script:
    # Install the boot manager to the ESP
    - command: "/usr/bin/bootctl --path=/boot install"
      timeout: 30

    # Write the default loader config
    - command: >-
        /usr/bin/bash -c
        "printf 'default arch.conf\ntimeout 3\neditor no\n' > /boot/loader/loader.conf"
      timeout: 10

    # Write the boot entry (ROOT_UUID is set in the environment by Calamares)
    - command: >-
        /usr/bin/bash -c
        "mkdir -p /boot/loader/entries &&
         root_uuid=$(blkid -s UUID -o value $(findmnt -n -o SOURCE /)) &&
         printf 'title   Arch Linux\nlinux   /vmlinuz-linux\ninitrd  /initramfs-linux.img\noptions root=UUID=%s rw quiet splash\n' \"$root_uuid\" > /boot/loader/entries/arch.conf"
      timeout: 15
