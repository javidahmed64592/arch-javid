---
# Calamares partition module configuration

# Backend: uses kpmcore
backend: kpmcore

# Allow the user to use all three partitioning modes:
#   erase        - wipe disk and use everything
#   replace      - replace an existing partition
#   alongside    - shrink and install alongside
#   manual       - full manual control (advanced users)
userSwapChoices:
    - none
    - small
    - suspend
    - file

# EFI system partition minimum size (MiB)
efiSystemPartitionSize: 512

# EFI system partition mount point
efiSystemPartitionName: /boot

# Default filesystem for the root partition
defaultFileSystemType: "ext4"

# Ensure the EFI system partition is created when in EFI mode
ensureSuspendToDisk: true
neverCreateSwap: false

# Size of the initial unallocated partition (avoids alignment issues)
initialPartitionTableType: gpt
