name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # Disk partitions
  EFI_SIZE: 1024
  SWAP_SIZE: 4096
  # Timezone and locale
  LOCAL_ZONE: Europe/London
  LOCALE: en_GB.UTF-8
  KEYMAP: uk
  # System configuration
  HOSTNAME: arch-javid
  USERNAME: javid
  PASSWORD: password

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: archlinux-pacman-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            archlinux-pacman-
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso
      - name: Copy Releng profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ /root/${{ github.event.repository.name }}
      - name: Prepare build directory
        run: |
          cp $GITHUB_WORKSPACE/arch-install.sh airootfs/root/
          sed -i \
            -e 's|^EFI_SIZE=.*|EFI_SIZE=${{ env.EFI_SIZE }}|' \
            -e 's|^SWAP_SIZE=.*|SWAP_SIZE=${{ env.SWAP_SIZE }}|' \
            -e 's|^LOCAL_ZONE=.*|LOCAL_ZONE="${{ env.LOCAL_ZONE }}"|' \
            -e 's|^LOCALE=.*|LOCALE="${{ env.LOCALE }}"|' \
            -e 's|^KEYMAP=.*|KEYMAP="${{ env.KEYMAP }}"|' \
            -e 's|^HOSTNAME=.*|HOSTNAME="${{ env.HOSTNAME }}"|' \
            -e 's|^USERNAME=.*|USERNAME="${{ env.USERNAME }}"|' \
            -e 's|^PASSWORD=.*|PASSWORD="${{ env.PASSWORD }}"|' \
            airootfs/root/arch-install.sh

          chmod +x airootfs/root/arch-install.sh
          chown root:root airootfs/root/arch-install.sh

          cp -r $GITHUB_WORKSPACE/scripts airootfs/root/
          chmod +x airootfs/root/scripts/*.sh
          chown -R root:root airootfs/root/scripts

          cp $GITHUB_WORKSPACE/packages.txt airootfs/root/
          chown root:root airootfs/root/packages.txt

          sed -i 's|\["/root"\]="0:0:750"|\["/root"\]="0:0:750"\n  \["/root/arch-install.sh"\]="0:0:755"\n  \["/root/scripts"\]="0:0:755"\n  \["/root/packages.txt"\]="0:0:644"|' profiledef.sh
          for script in $GITHUB_WORKSPACE/scripts/*.sh; do
            name=$(basename "$script")
            sed -i "s|\[\"/root/scripts\"\]=\"0:0:755\"|\[\"/root/scripts\"\]=\"0:0:755\"\n  \[\"/root/scripts/${name}\"\]=\"0:0:755\"|" profiledef.sh
          done

          mkdir -p airootfs/etc/systemd/system/
          cp $GITHUB_WORKSPACE/arch-install.service airootfs/etc/systemd/system/

          ln -s /etc/systemd/system/arch-install.service airootfs/etc/systemd/system/multi-user.target.wants/arch-install.service
        working-directory: /root/${{ github.event.repository.name }}
      - name: Build ISO
        run: |
          mkarchiso -v -w /root/work -o /root/out .
        working-directory: /root/${{ github.event.repository.name }}
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-iso
          path: /root/out/*.iso
