name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: archlinux-pacman-${{ hashFiles('.github/workflows/build.yml', 'live-packages.txt', 'packages.txt') }}
          restore-keys: |
            archlinux-pacman-

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso

      - name: Initialise pacman keyring
        run: |
          # Initialise the keyring so mkarchiso can verify official package signatures.
          # --init creates the local secret key; --populate imports Arch Linux developer keys.
          pacman-key --init
          pacman-key --populate archlinux

      - name: Cache calamares package
        id: calamares-cache
        uses: actions/cache@v4
        with:
          path: /root/local-repo
          key: calamares-pkg-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Build calamares from AUR
        if: steps.calamares-cache.outputs.cache-hit != 'true'
        run: |
          # Install the tools needed to run makepkg itself.
          # All other makedepends are resolved by makepkg --syncdeps from the PKGBUILD,
          # which avoids maintaining a hand-rolled list of KDE/Qt package names.
          pacman -S --noconfirm --needed base-devel git

          # makepkg refuses to run as root; create a dedicated build user.
          useradd -m calamares-builder
          echo "calamares-builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          su - calamares-builder -c '
            git clone https://aur.archlinux.org/calamares.git /tmp/calamares-aur
            cd /tmp/calamares-aur
            makepkg --syncdeps --noconfirm --skippgpcheck --noprogressbar
          '

          # Create a local pacman repo containing only the built calamares package.
          mkdir -p /root/local-repo
          mv /tmp/calamares-aur/calamares-*.pkg.tar.zst /root/local-repo/
          repo-add /root/local-repo/local-packages.db.tar.zst /root/local-repo/calamares-*.pkg.tar.zst

      - name: Copy Releng profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ /root/${{ github.event.repository.name }}

      - name: Configure profile repos
        run: |
          # Add the local repo (pre-built calamares) to the profile's pacman.conf.
          # SigLevel Optional TrustAll skips signature verification for the locally
          # built package which has no detached signature.
          printf '\n[local-packages]\nSigLevel = Optional TrustAll\nServer = file:///root/local-repo\n' >> pacman.conf
        working-directory: /root/${{ github.event.repository.name }}

      - name: Append live ISO packages
        run: |
          grep -v '^\s*#' $GITHUB_WORKSPACE/live-packages.txt | grep -v '^\s*$' >> packages.x86_64
        working-directory: /root/${{ github.event.repository.name }}

      - name: Install Calamares config
        run: |
          mkdir -p airootfs/etc/calamares/modules
          mkdir -p airootfs/etc/calamares/scripts
          cp    $GITHUB_WORKSPACE/calamares/settings.conf       airootfs/etc/calamares/
          cp -r $GITHUB_WORKSPACE/calamares/modules/.           airootfs/etc/calamares/modules/
          cp -r $GITHUB_WORKSPACE/calamares/scripts/.           airootfs/etc/calamares/scripts/
          chmod +x airootfs/etc/calamares/scripts/*.sh
          cp    $GITHUB_WORKSPACE/packages.txt                  airootfs/etc/calamares/
        working-directory: /root/${{ github.event.repository.name }}

      - name: Install live ISO overlay
        run: |
          cp -r $GITHUB_WORKSPACE/airootfs/. airootfs/
        working-directory: /root/${{ github.event.repository.name }}

      - name: Install NVIDIA script
        run: |
          mkdir -p airootfs/root/scripts/chroot
          cp    $GITHUB_WORKSPACE/scripts/chroot/nvidia.sh airootfs/root/scripts/chroot/
          chmod +x airootfs/root/scripts/chroot/nvidia.sh
        working-directory: /root/${{ github.event.repository.name }}

      - name: Update profiledef.sh permissions
        run: |
          sed -i \
            's|\["/root"\]="0:0:750"|\["/root"\]="0:0:750"\n  \["/root/customize_airootfs.sh"\]="0:0:755"\n  \["/root/scripts"\]="0:0:755"\n  \["/root/scripts/chroot"\]="0:0:755"\n  \["/root/scripts/chroot/nvidia.sh"\]="0:0:755"|' \
            profiledef.sh

          sed -i \
            's|\["/root"\]="0:0:750"|\["/root"\]="0:0:750"\n  \["/etc/calamares"\]="0:0:755"\n  \["/etc/calamares/packages.txt"\]="0:0:644"\n  \["/etc/calamares/settings.conf"\]="0:0:644"\n  \["/etc/calamares/scripts"\]="0:0:755"|' \
            profiledef.sh

          for script in $(find $GITHUB_WORKSPACE/calamares/scripts -name "*.sh" | sort); do
            name=$(basename "$script")
            sed -i "s|\[\"/etc/calamares/scripts\"\]=\"0:0:755\"|\[\"/etc/calamares/scripts\"\]=\"0:0:755\"\n  \[\"/etc/calamares/scripts/${name}\"\]=\"0:0:755\"|" profiledef.sh
          done
        working-directory: /root/${{ github.event.repository.name }}

      - name: Build ISO
        run: |
          mkarchiso -v -w /root/work -o /root/out .
        working-directory: /root/${{ github.event.repository.name }}

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-iso
          path: /root/out/*.iso
