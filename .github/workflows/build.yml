name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # Disk partitions
  EFI_SIZE: 2048
  # Timezone and locale
  LOCAL_ZONE: Europe/London
  LOCALE: en_GB.UTF-8
  KEYMAP: uk
  X11_KEYMAP: gb
  # System configuration
  HOSTNAME: arch-javid
  USERNAME: javid
  PASSWORD: password

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: archlinux-pacman-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            archlinux-pacman-
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso grub
      - name: Copy Releng profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ /root/${{ github.event.repository.name }}
      - name: Prepare build directory
        run: |
          # Copy custom profiledef.sh with all file permissions
          cp $GITHUB_WORKSPACE/profiledef.sh .

          # Copy live ISO package list
          cp $GITHUB_WORKSPACE/packages.x86_64 .

          # Copy airootfs customization files for live environment
          # (includes customize_airootfs.sh, sddm config, sudoers config)
          cp -r $GITHUB_WORKSPACE/airootfs/* airootfs/
          chmod +x airootfs/root/customize_airootfs.sh

          # Copy installation scripts to airootfs/root for installer
          cp -r $GITHUB_WORKSPACE/scripts airootfs/root/

          # Inject build-time variables into installer script
          sed -i \
            -e 's|^EFI_SIZE=.*|EFI_SIZE=${{ env.EFI_SIZE }}|' \
            -e 's|^LOCAL_ZONE=.*|LOCAL_ZONE="${{ env.LOCAL_ZONE }}"|' \
            -e 's|^LOCALE=.*|LOCALE="${{ env.LOCALE }}"|' \
            -e 's|^KEYMAP=.*|KEYMAP="${{ env.KEYMAP }}"|' \
            -e 's|^X11_KEYMAP=.*|X11_KEYMAP="${{ env.X11_KEYMAP }}"|' \
            -e 's|^HOSTNAME=.*|HOSTNAME="${{ env.HOSTNAME }}"|' \
            -e 's|^USERNAME=.*|USERNAME="${{ env.USERNAME }}"|' \
            -e 's|^PASSWORD=.*|PASSWORD="${{ env.PASSWORD }}"|' \
            airootfs/root/scripts/arch-install.sh

          # Make all scripts executable
          find airootfs/root/scripts -name "*.sh" -exec chmod +x {} \;

          # Copy installer package list to airootfs/root
          cp $GITHUB_WORKSPACE/packages.txt airootfs/root/

          # Set proper ownership
          chown -R root:root airootfs/root/scripts
          chown root:root airootfs/root/packages.txt
          chown root:root airootfs/root/customize_airootfs.sh
          chown root:root airootfs/etc/sddm.conf.d/autologin.conf
          chown root:root airootfs/etc/sudoers.d/liveuser
        working-directory: /root/${{ github.event.repository.name }}
      - name: Build ISO
        run: |
          mkarchiso -v -w /root/work -o /root/out .
        working-directory: /root/${{ github.event.repository.name }}
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-iso
          path: /root/out/*.iso
