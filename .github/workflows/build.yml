name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # Disk partitions
  EFI_SIZE: 2048
  # Timezone and locale
  LOCAL_ZONE: Europe/London
  LOCALE: en_GB.UTF-8
  KEYMAP: uk
  # System configuration
  HOSTNAME: arch-javid
  USERNAME: javid
  PASSWORD: password

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: archlinux-pacman-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            archlinux-pacman-
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm archiso
      - name: Copy Releng profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ /root/${{ github.event.repository.name }}
      - name: Prepare build directory
        run: |
          cp -r $GITHUB_WORKSPACE/scripts airootfs/root/
          sed -i \
            -e 's|^EFI_SIZE=.*|EFI_SIZE=${{ env.EFI_SIZE }}|' \
            -e 's|^LOCAL_ZONE=.*|LOCAL_ZONE="${{ env.LOCAL_ZONE }}"|' \
            -e 's|^LOCALE=.*|LOCALE="${{ env.LOCALE }}"|' \
            -e 's|^KEYMAP=.*|KEYMAP="${{ env.KEYMAP }}"|' \
            -e 's|^HOSTNAME=.*|HOSTNAME="${{ env.HOSTNAME }}"|' \
            -e 's|^USERNAME=.*|USERNAME="${{ env.USERNAME }}"|' \
            -e 's|^PASSWORD=.*|PASSWORD="${{ env.PASSWORD }}"|' \
            airootfs/root/scripts/arch-install.sh

          find airootfs/root/scripts -name "*.sh" -exec chmod +x {} \;
          chown -R root:root airootfs/root/scripts

          cp $GITHUB_WORKSPACE/packages.txt airootfs/root/
          chown root:root airootfs/root/packages.txt

          sed -i 's|\["/root"\]="0:0:750"|\["/root"\]="0:0:750"\n  \["/root/scripts"\]="0:0:755"\n  \["/root/scripts/system"\]="0:0:755"\n  \["/root/scripts/chroot"\]="0:0:755"\n  \["/root/packages.txt"\]="0:0:644"|' profiledef.sh
          for script in $(find $GITHUB_WORKSPACE/scripts -name "*.sh" | sort); do
            rel_path="${script#$GITHUB_WORKSPACE/}"
            entry="/root/${rel_path}"
            parent_entry="/root/$(dirname ${rel_path})"
            sed -i "s|\[\"${parent_entry}\"\]=\"0:0:755\"|\[\"${parent_entry}\"\]=\"0:0:755\"\n  \[\"${entry}\"\]=\"0:0:755\"|" profiledef.sh
          done

          # Add script= boot parameter to run installer on boot
          sed -i 's|archisobasedir=%INSTALL_DIR%|archisobasedir=%INSTALL_DIR% script=/root/scripts/arch-install.sh|' grub/grub.cfg
          sed -i 's|archisobasedir=%INSTALL_DIR%|archisobasedir=%INSTALL_DIR% script=/root/scripts/arch-install.sh|' syslinux/archiso_sys-linux.cfg
          sed -i 's|archisobasedir=%INSTALL_DIR%|archisobasedir=%INSTALL_DIR% script=/root/scripts/arch-install.sh|' syslinux/archiso_pxe-linux.cfg
        working-directory: /root/${{ github.event.repository.name }}
      - name: Build ISO
        run: |
          mkarchiso -v -w /root/work -o /root/out .
        working-directory: /root/${{ github.event.repository.name }}
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-iso
          path: /root/out/*.iso
