name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  # Disk partitions
  DISK: /dev/sda
  EFI_SIZE: 1024
  SWAP_SIZE: 4096
  # Timezone and locale
  LOCAL_ZONE: Europe/London
  LOCALE: en_GB.UTF-8
  KEYMAP: uk
  # System configuration
  HOSTNAME: arch-javid
  USERNAME: javid
  PASSWORD: password

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo pacman -S archiso
      - name: Copy Releng profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ ~/${{ github.repository }}
      - name: Prepare build directory
        run: |
          cp ../arch-install.sh airootfs/root/
          sed -i \
            -e 's|^DISK=.*|DISK="${{ env.DISK }}"|' \
            -e 's|^EFI_SIZE=.*|EFI_SIZE=${{ env.EFI_SIZE }}|' \
            -e 's|^SWAP_SIZE=.*|SWAP_SIZE=${{ env.SWAP_SIZE }}|' \
            -e 's|^LOCAL_ZONE=.*|LOCAL_ZONE="${{ env.LOCAL_ZONE }}"|' \
            -e 's|^LOCALE=.*|LOCALE="${{ env.LOCALE }}"|' \
            -e 's|^KEYMAP=.*|KEYMAP="${{ env.KEYMAP }}"|' \
            -e 's|^HOSTNAME=.*|HOSTNAME="${{ env.HOSTNAME }}"|' \
            -e 's|^USERNAME=.*|USERNAME="${{ env.USERNAME }}"|' \
            -e 's|^PASSWORD=.*|PASSWORD="${{ env.PASSWORD }}"|' \
            airootfs/root/arch-install.sh

          chmod +x airootfs/root/arch-install.sh
          chown root:root airootfs/root/arch-install.sh

          mkdir -p airootfs/etc/systemd/system/
          cp ../arch-install.service airootfs/etc/systemd/system/

          ln -s /etc/systemd/system/arch-install.service airootfs/etc/systemd/system/multi-user.target.wants/arch-install.service
        working-directory: ~/${{ github.repository }}
      - name: Build ISO
        run: |
          sudo mkarchiso -v -w ~/work -o ~/out .
        working-directory: ~/${{ github.repository }}
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.repository }}-iso
          path: ~/out/*.iso
