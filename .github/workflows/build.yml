name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      # ── 1. Host tooling ──────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archiso base-devel git

      # ── 2. Base profile ──────────────────────────────────────────────────────
      - name: Copy Releng profile
        run: |
          cp -r /usr/share/archiso/configs/releng/ /root/${{ github.event.repository.name }}

      # ── 3. Build Calamares from AUR ────────────────────────────────────────────
      - name: Build Calamares from AUR
        run: |
          # Create a non-root build user with passwordless sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

          # Clone the calamares PKGBUILD from the AUR
          su builder -c "git clone --depth=1 https://aur.archlinux.org/calamares.git /home/builder/calamares"

          # Build, pulling all official-repo deps automatically (-s),
          # without prompting (-r removes make-deps after build, --noconfirm skips prompts)
          su builder -c "cd /home/builder/calamares && makepkg -s --noconfirm"

          # Collect the package and create a local repo database
          mkdir -p /root/localrepo
          cp /home/builder/calamares/*.pkg.tar.zst /root/localrepo/
          repo-add /root/localrepo/localrepo.db.tar.gz /root/localrepo/*.pkg.tar.zst

      # ── 4. Wire local repo into profile pacman.conf ─────────────────────────
      - name: Register local package repository
        # Prepend [localrepo] before [core] so it takes priority.
        # SigLevel is Optional TrustAll because we built the package locally
        # and have no GPG key to sign it with.
        run: |
          sed -i '/^\[core\]/i [localrepo]\nSigLevel = Optional TrustAll\nServer = file:\/\/\/root\/localrepo\n' pacman.conf
        working-directory: /root/${{ github.event.repository.name }}

      # ── 5. Packages ──────────────────────────────────────────────────────────
      - name: Add KDE / Wayland / Calamares packages
        run: |
          cat $GITHUB_WORKSPACE/packages.x86_64 >> packages.x86_64
        working-directory: /root/${{ github.event.repository.name }}

      # ── 6. Calamares configuration ───────────────────────────────────────────
      - name: Install Calamares configuration
        run: |
          mkdir -p airootfs/etc/calamares
          cp -r $GITHUB_WORKSPACE/calamares/* airootfs/etc/calamares/
        working-directory: /root/${{ github.event.repository.name }}

      # ── 7. airootfs overlay ──────────────────────────────────────────────────
      - name: Merge airootfs overlay
        # Copies our airootfs/ tree on top of the releng airootfs/ so that:
        #   - etc/sddm.conf.d/autologin.conf  → SDDM auto-logins liveuser
        #   - etc/sudoers.d/liveuser          → passwordless calamares launch
        #   - root/customize_airootfs.sh      → run by mkarchiso in chroot to
        #                                       create liveuser + KDE autostart
        run: |
          cp -r $GITHUB_WORKSPACE/airootfs/. airootfs/

          # Hard permissions required by sudo and the shell script
          chmod 755 airootfs/root/customize_airootfs.sh
          chmod 440 airootfs/etc/sudoers.d/liveuser
        working-directory: /root/${{ github.event.repository.name }}

      # ── 8. Systemd services in the live environment ──────────────────────────
      - name: Enable live-session services (SDDM + NetworkManager)
        # Wire sddm as the display-manager and start NetworkManager so the
        # live desktop has networking without any manual intervention.
        # These symlinks only affect the live ISO; services in the installed
        # system are handled by the Calamares services-systemd module.
        run: |
          mkdir -p airootfs/etc/systemd/system/multi-user.target.wants

          # SDDM → autologin liveuser into KDE/Wayland
          ln -sf /usr/lib/systemd/system/sddm.service \
            airootfs/etc/systemd/system/display-manager.service
          ln -sf /usr/lib/systemd/system/sddm.service \
            airootfs/etc/systemd/system/multi-user.target.wants/sddm.service

          # NetworkManager → live networking for Calamares and general use
          ln -sf /usr/lib/systemd/system/NetworkManager.service \
            airootfs/etc/systemd/system/multi-user.target.wants/NetworkManager.service
          ln -sf /usr/lib/systemd/system/NetworkManager-dispatcher.service \
            airootfs/etc/systemd/system/dbus-org.freedesktop.nm-dispatcher.service
        working-directory: /root/${{ github.event.repository.name }}

      # ── 9. profiledef.sh file permissions ───────────────────────────────────
      - name: Register new file permissions in profiledef.sh
        run: |
          sed -i \
            '/^file_permissions=(/,/^)/{s|^)|  ["/root/customize_airootfs.sh"]="0:0:755"\n  ["/etc/sudoers.d/liveuser"]="0:0:440"\n)|}' \
            profiledef.sh
        working-directory: /root/${{ github.event.repository.name }}

      # ── 10. Build ────────────────────────────────────────────────────────────
      - name: Build ISO
        run: |
          mkarchiso -v -w /root/work -o /root/out .
        working-directory: /root/${{ github.event.repository.name }}

      # ── 11. Artifact ─────────────────────────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-iso
          path: /root/out/*.iso
